name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild -project RuvNoise.xcodeproj -scheme RuvNoise -configuration Release -derivedDataPath build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES

      - name: Upload app
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: RuvNoise.app
          path: build/Build/Products/Release/RuvNoise.app
